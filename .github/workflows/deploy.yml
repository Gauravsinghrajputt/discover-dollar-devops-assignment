name: CI-CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Docker login
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build backend
      run: docker build -t ${{ secrets.DOCKER_USERNAME }}/backend ./backend

    - name: Build frontend
      run: docker build -t ${{ secrets.DOCKER_USERNAME }}/frontend ./frontend

    - name: Push backend
      run: docker push ${{ secrets.DOCKER_USERNAME }}/backend

    - name: Push frontend
      run: docker push ${{ secrets.DOCKER_USERNAME }}/frontend
